name: Hermes Agent — Telegram + Local (all tools)

on:
  workflow_dispatch:

concurrency:
  group: hermes-agent
  cancel-in-progress: false

env:
  HERMES_MODEL: "tencent/hy3:free"
  RUN_MINUTES: 330            # total budget from job start (wait time included)
  HERMES_HOME: /home/runner/.hermes
  DATA_REPO: jahid12525/harmesprivatestorage

jobs:
  hermes:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      # ── 0. Acquire global lock: only ONE Hermes run anywhere, ever ──
      - name: Acquire global run lock
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          date +%s > /tmp/job_start
          REPO_URL="https://x-access-token:${DATA_REPO_TOKEN}@github.com/${DATA_REPO}.git"
          for attempt in $(seq 1 90); do
            rm -rf /tmp/lockchk
            if git clone -q --depth 1 --branch lock "$REPO_URL" /tmp/lockchk 2>/dev/null; then
              HB=$(cat /tmp/lockchk/HEARTBEAT 2>/dev/null || echo 0)
              AGE=$(( $(date +%s) - HB ))
              if [ "$AGE" -lt 1200 ]; then
                echo "🔒 Another run active (heartbeat ${AGE}s ago) — waiting... (attempt $attempt)"
                sleep 60
                continue
              fi
              echo "💀 Stale lock (${AGE}s) — previous run died. Stealing lock."
              git push -q "$REPO_URL" --delete lock || echo "⚠️ lock delete failed"
            fi
            rm -rf /tmp/lock && mkdir /tmp/lock && cd /tmp/lock
            git init -q -b lock
            git config user.name hermes-lock
            git config user.email lock@local
            date +%s > HEARTBEAT
            echo "${{ github.repository }} run=${{ github.run_id }}" > OWNER
            git add -A && git commit -qm "lock"
            if git push -q "$REPO_URL" lock 2>/dev/null; then
              echo "✅ Lock acquired"
              exit 0
            fi
            echo "Lost acquisition race — retrying in 30s"
            sleep 30
          done
          echo "❌ Could not acquire lock within 90 min — giving up"
          exit 1

      # ── 1. Pull Hermes data (+ reassemble chunked files) ──
      - name: Pull Hermes data from private data repo
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.DATA_REPO_TOKEN }}@github.com/${DATA_REPO}.git" \
            "$HERMES_HOME" || mkdir -p "$HERMES_HOME"
          rm -f "$HERMES_HOME/.env"
          find "$HERMES_HOME" -name "*.gh-chunk.000" | while read -r first; do
            base="${first%.gh-chunk.000}"
            cat "$base".gh-chunk.* > "$base"
            rm -f "$base".gh-chunk.*
            echo "Reassembled: $base"
          done
          echo "Restored $(du -sh "$HERMES_HOME" 2>/dev/null | cut -f1) of Hermes data"

      # ── 2. Install Hermes Agent (FIX: clean stale install dir first) ──
      - name: Install Hermes Agent
        run: |
          rm -rf "$HERMES_HOME/hermes-agent"
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # ── 3. SearXNG (JSON API enabled) ──
      - name: Start SearXNG (free web search backend)
        run: |
          mkdir -p "$PWD/searxng"
          SECRET=$(openssl rand -hex 32)
          cat > "$PWD/searxng/settings.yml" <<EOF
          use_default_settings: true
          server:
            secret_key: "${SECRET}"
            limiter: false
          search:
            formats:
              - html
              - json
          EOF
          docker run -d --name searxng -p 8080:8080 \
            -v "$PWD/searxng:/etc/searxng" \
            searxng/searxng:latest
          for i in $(seq 1 30); do
            if curl -fsS "http://localhost:8080/search?q=test&format=json" >/dev/null 2>&1; then
              echo "SearXNG JSON API is up"; exit 0
            fi
            sleep 2
          done
          echo "SearXNG JSON API failed to start"; docker logs searxng; exit 1

      # ── 4. Camoufox ──
      - name: Install & start Camoufox
        run: |
          pip install -U "camoufox[geoip]"
          python -m camoufox fetch
          nohup python -c "from camoufox.server import launch_server; launch_server(headless=True, port=9222, ws_path='hermes')" \
            > camoufox.log 2>&1 &
          for i in $(seq 1 30); do
            (exec 3<>/dev/tcp/127.0.0.1/9222) 2>/dev/null && { echo "Camoufox is up"; break; }
            sleep 2
          done

      # ── 5. Secrets → .env ──
      - name: Write Hermes .env
        run: |
          mkdir -p "$HERMES_HOME"
          cat > "$HERMES_HOME/.env" <<EOF
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS=${{ secrets.TELEGRAM_USER_ID }}
          SEARXNG_URL=http://localhost:8080
          CAMOUFOX_URL=ws://127.0.0.1:9222/hermes
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          EOF
          chmod 600 "$HERMES_HOME/.env"

      # ── 6. Configure Hermes ──
      - name: Configure Hermes (model, search, TTS, tools)
        run: |
          hermes config set model "$HERMES_MODEL"
          hermes config set web.search_backend searxng
          hermes config set tts.provider edge
          hermes config set toolsets '["terminal","files","web","browser","code","vision","tts","memory","skills","delegation","cron"]'
          hermes doctor || true

      # ── 7. Background loops: heartbeat (10 min) + data backup (30 min) ──
      - name: Start heartbeat + periodic backup
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          cat > /tmp/heartbeat.sh <<'HB'
          #!/bin/bash
          TMP=$(mktemp -d); cd "$TMP"
          git init -q -b lock
          git config user.name hermes-lock
          git config user.email lock@local
          date +%s > HEARTBEAT
          echo "$GITHUB_REPOSITORY run=$GITHUB_RUN_ID" > OWNER
          git add -A && git commit -qm "heartbeat"
          git push -qf "https://x-access-token:${DATA_REPO_TOKEN}@github.com/${DATA_REPO}.git" lock
          cd / && rm -rf "$TMP"
          HB
          cat > /tmp/sync.sh <<'SYNC'
          #!/bin/bash
          cd "$HERMES_HOME" || exit 0
          TMP=$(mktemp -d)
          rsync -a --exclude '.env' --exclude '.git' --exclude '*.log' --exclude 'hermes-agent' ./ "$TMP/"
          cd "$TMP"
          find . -type f -size +90M ! -name "*.gh-chunk.*" | while read -r f; do
            split -b 90M -d -a 3 "$f" "$f.gh-chunk."; rm "$f"
          done
          git init -q -b backup
          git config user.name hermes-runner
          git config user.email hermes-runner@users.noreply.github.com
          git remote add origin "https://x-access-token:${DATA_REPO_TOKEN}@github.com/${DATA_REPO}.git"
          git add -A && git commit -qm "mid-run backup $(date -u +%H:%M)" && git push -qf origin backup
          rm -rf "$TMP"
          SYNC
          chmod +x /tmp/heartbeat.sh /tmp/sync.sh
          nohup bash -c 'while true; do sleep 600; /tmp/heartbeat.sh; done' > /tmp/hb.log 2>&1 &
          nohup bash -c 'while true; do sleep 1800; /tmp/sync.sh; done' > /tmp/sync.log 2>&1 &
          echo "Heartbeat + backup loops started"

      # ── 8. Notify online ──
      - name: Notify bot online (Telegram)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_USER_ID}" \
            -d text="🟢 Hermes online (run ${{ github.run_id }})" > /dev/null || true

      # ── 9. Gateway with crash auto-restart (budget from JOB start) ──
      - name: Run Hermes gateway (Telegram bot)
        run: |
          JOB_START=$(cat /tmp/job_start)
          END=$(( JOB_START + RUN_MINUTES * 60 ))
          while [ "$(date +%s)" -lt "$END" ]; do
            REMAIN=$(( (END - $(date +%s)) / 60 ))
            [ "$REMAIN" -lt 2 ] && break
            timeout -k 60 "${REMAIN}m" hermes gateway || true
            echo "Gateway exited — restarting in 10s ($REMAIN min budget left)"
            sleep 10
          done

      # ── 10. Push data back (FIX: exclude hermes-agent install dir) ──
      - name: Push Hermes data to private data repo
        if: always()
        run: |
          cd "$HERMES_HOME"
          rm -f .env
          rm -rf .git
          rm -rf hermes-agent
          cat > .gitignore <<'EOF'
          .env
          *.log
          hermes-agent/
          EOF
          find . -type f -size +90M ! -name "*.gh-chunk.*" | while read -r f; do
            split -b 90M -d -a 3 "$f" "$f.gh-chunk."
            rm "$f"
            echo "Chunked: $f"
          done
          git init -b main
          git config user.name "hermes-runner"
          git config user.email "hermes-runner@users.noreply.github.com"
          git remote add origin \
            "https://x-access-token:${{ secrets.DATA_REPO_TOKEN }}@github.com/${DATA_REPO}.git"
          git add -A
          git commit -m "hermes data sync $(date -u +'%Y-%m-%dT%H:%M:%SZ') (run ${{ github.run_id }})" || echo "Nothing to commit"
          git push --force origin main

      # ── 11. Release the global lock (AFTER data is pushed) ──
      - name: Release global run lock
        if: always()
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          git push -q "https://x-access-token:${DATA_REPO_TOKEN}@github.com/${DATA_REPO}.git" \
            --delete lock || echo "⚠️ lock delete failed"

      # ── 12. Notify failure ──
      - name: Notify failure (Telegram)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_USER_ID}" \
            -d text="🔴 Hermes run ${{ github.run_id }} FAILED — check Actions logs" > /dev/null || true
