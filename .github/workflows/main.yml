name: Hermes Agent — Telegram + NVIDIA (all tools)

on:
  workflow_dispatch:

concurrency:
  group: hermes-agent
  cancel-in-progress: false

env:
  # LiteLLM proxy-র virtual model — আসল মডেলগুলো Step 4.5-এর লিস্টে
  HERMES_MODEL: "nim/smart"
  RUN_MINUTES: 330            # total budget from job start
  HERMES_HOME: /home/runner/.hermes
  DATA_REPO: jahid12525/harmesprivatestorage

jobs:
  hermes:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      # ── 1. Pull Hermes data (+ reassemble chunked files) ──
      - name: Pull Hermes data from private data repo
        run: |
          date +%s > /tmp/job_start
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.DATA_REPO_TOKEN }}@github.com/${DATA_REPO}.git" \
            "$HERMES_HOME" || mkdir -p "$HERMES_HOME"
          rm -f "$HERMES_HOME/.env"
          find "$HERMES_HOME" -name "*.gh-chunk.000" | while read -r first; do
            base="${first%.gh-chunk.000}"
            cat "$base".gh-chunk.* > "$base"
            rm -f "$base".gh-chunk.*
            echo "Reassembled: $base"
          done
          echo "Restored $(du -sh "$HERMES_HOME" 2>/dev/null | cut -f1) of Hermes data"

      # ── 2. Install Hermes Agent (clean stale install dir first) ──
      - name: Install Hermes Agent
        run: |
          rm -rf "$HERMES_HOME/hermes-agent"
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # ── 3. SearXNG (JSON API enabled) ──
      - name: Start SearXNG (free web search backend)
        run: |
          mkdir -p "$PWD/searxng"
          SECRET=$(openssl rand -hex 32)
          cat > "$PWD/searxng/settings.yml" <<EOF
          use_default_settings: true
          server:
            secret_key: "${SECRET}"
            limiter: false
          search:
            formats:
              - html
              - json
          EOF
          docker run -d --name searxng -p 8080:8080 \
            -v "$PWD/searxng:/etc/searxng" \
            searxng/searxng:latest
          for i in $(seq 1 30); do
            if curl -fsS "http://localhost:8080/search?q=test&format=json" >/dev/null 2>&1; then
              echo "SearXNG JSON API is up"; exit 0
            fi
            sleep 2
          done
          echo "SearXNG JSON API failed to start"; docker logs searxng; exit 1

      # ── 4. Camoufox ──
      - name: Install & start Camoufox
        run: |
          pip install -U "camoufox[geoip]"
          python -m camoufox fetch
          nohup python -c "from camoufox.server import launch_server; launch_server(headless=True, port=9222, ws_path='hermes')" \
            > camoufox.log 2>&1 &
          for i in $(seq 1 30); do
            (exec 3<>/dev/tcp/127.0.0.1/9222) 2>/dev/null && { echo "Camoufox is up"; break; }
            sleep 2
          done

      # ── 4.5 LiteLLM proxy: auto failover across NVIDIA free models ──
      - name: Start LiteLLM failover proxy
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          pip install -U "litellm[proxy]"
          cat > /tmp/litellm.yaml <<'EOF'
          model_list:
            - model_name: smart
              litellm_params:
                model: openai/z-ai/glm-5.2
                api_base: https://integrate.api.nvidia.com/v1
                api_key: os.environ/NVIDIA_API_KEY
            - model_name: smart
              litellm_params:
                model: openai/deepseek-ai/deepseek-v4-flash
                api_base: https://integrate.api.nvidia.com/v1
                api_key: os.environ/NVIDIA_API_KEY
            - model_name: smart
              litellm_params:
                model: openai/moonshotai/kimi-k2.6
                api_base: https://integrate.api.nvidia.com/v1
                api_key: os.environ/NVIDIA_API_KEY
            - model_name: smart
              litellm_params:
                model: openai/nvidia/nemotron-3-super-120b-a12b
                api_base: https://integrate.api.nvidia.com/v1
                api_key: os.environ/NVIDIA_API_KEY
            - model_name: smart
              litellm_params:
                model: openai/nvidia/nemotron-3-nano-30b-a3b
                api_base: https://integrate.api.nvidia.com/v1
                api_key: os.environ/NVIDIA_API_KEY
            - model_name: smart
              litellm_params:
                model: openai/deepseek-ai/deepseek-v4-pro
                api_base: https://integrate.api.nvidia.com/v1
                api_key: os.environ/NVIDIA_API_KEY
            - model_name: smart
              litellm_params:
                model: openai/nvidia/nemotron-3-ultra-550b-a55b
                api_base: https://integrate.api.nvidia.com/v1
                api_key: os.environ/NVIDIA_API_KEY
          litellm_settings:
            num_retries: 1
            request_timeout: 300
          router_settings:
            allowed_fails: 2
            cooldown_time: 120
          EOF
          nohup litellm --config /tmp/litellm.yaml --port 4000 > /tmp/litellm.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fsS http://localhost:4000/health/liveliness >/dev/null 2>&1 && { echo "LiteLLM proxy up"; break; }
            sleep 2
          done

      # ── 5. Secrets → .env ──
      - name: Write Hermes .env
        run: |
          mkdir -p "$HERMES_HOME"
          cat > "$HERMES_HOME/.env" <<EOF
          NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS=${{ secrets.TELEGRAM_USER_ID }}
          SEARXNG_URL=http://localhost:8080
          CAMOUFOX_URL=ws://127.0.0.1:9222/hermes
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          EOF
          chmod 600 "$HERMES_HOME/.env"

      # ── 6. Configure Hermes (points at local LiteLLM proxy) ──
      - name: Configure Hermes
        run: |
          hermes config set providers.nim.base_url "http://localhost:4000/v1"
          hermes config set providers.nim.api_key_env NVIDIA_API_KEY
          hermes config set model "$HERMES_MODEL"
          hermes config set web.search_backend searxng
          hermes config set tts.provider edge
          hermes config set toolsets '["terminal","files","web","browser","code","vision","tts","memory","skills","delegation","cron"]'
          hermes doctor || true

      # ── 7. Background loop: data backup every 30 min ──
      - name: Start periodic backup loop
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          cat > /tmp/sync.sh <<'SYNC'
          #!/bin/bash
          cd "$HERMES_HOME" || exit 0
          TMP=$(mktemp -d)
          rsync -a --exclude '.env' --exclude '.git' --exclude '*.log' --exclude 'hermes-agent' ./ "$TMP/"
          cd "$TMP"
          find . -type f -size +90M ! -name "*.gh-chunk.*" | while read -r f; do
            split -b 90M -d -a 3 "$f" "$f.gh-chunk."; rm "$f"
          done
          git init -q -b backup
          git config user.name hermes-runner
          git config user.email hermes-runner@users.noreply.github.com
          git remote add origin "https://x-access-token:${DATA_REPO_TOKEN}@github.com/${DATA_REPO}.git"
          git add -A && git commit -qm "mid-run backup $(date -u +%H:%M)" && git push -qf origin backup
          rm -rf "$TMP"
          SYNC
          chmod +x /tmp/sync.sh
          nohup bash -c 'while true; do sleep 1800; /tmp/sync.sh; done' > /tmp/sync.log 2>&1 &
          echo "Backup loop started"

      # ── 8. Notify online ──
      - name: Notify bot online (Telegram)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          curl -s -X POST \
            "{{https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}}}/sendMessage" \
            -d chat_id="${TELEGRAM_USER_ID}" \
            -d text="🟢 Hermes online (run ${{ github.run_id }}) — NVIDIA multi-model failover active" > /dev/null || true

      # ── 9. Gateway with crash auto-restart (budget from JOB start) ──
      - name: Run Hermes gateway (Telegram bot)
        run: |
          JOB_START=$(cat /tmp/job_start)
          END=$(( JOB_START + RUN_MINUTES * 60 ))
          while [ "$(date +%s)" -lt "$END" ]; do
            REMAIN=$(( (END - $(date +%s)) / 60 ))
            [ "$REMAIN" -lt 2 ] && break
            timeout -k 60 "${REMAIN}m" hermes gateway || true
            echo "Gateway exited — restarting in 10s ($REMAIN min budget left)"
            sleep 10
          done

      # ── 10. Push data back (exclude hermes-agent install dir) ──
      - name: Push Hermes data to private data repo
        if: always()
        run: |
          cd "$HERMES_HOME"
          rm -f .env
          rm -rf .git
          rm -rf hermes-agent
          cat > .gitignore <<'EOF'
          .env
          *.log
          hermes-agent/
          EOF
          find . -type f -size +90M ! -name "*.gh-chunk.*" | while read -r f; do
            split -b 90M -d -a 3 "$f" "$f.gh-chunk."
            rm "$f"
            echo "Chunked: $f"
          done
          git init -b main
          git config user.name "hermes-runner"
          git config user.email "hermes-runner@users.noreply.github.com"
          git remote add origin \
            "https://x-access-token:${{ secrets.DATA_REPO_TOKEN }}@github.com/${DATA_REPO}.git"
          git add -A
          git commit -m "hermes data sync $(date -u +'%Y-%m-%dT%H:%M:%SZ') (run ${{ github.run_id }})" || echo "Nothing to commit"
          git push --force origin main

      # ── 11. Notify failure ──
      - name: Notify failure (Telegram)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        run: |
          curl -s -X POST \
            "{{https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}}}/sendMessage" \
            -d chat_id="${TELEGRAM_USER_ID}" \
            -d text="🔴 Hermes run ${{ github.run_id }} FAILED — check Actions logs" > /dev/null || true
